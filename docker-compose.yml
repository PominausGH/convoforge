services:
  api:
    build:
      context: ./services/api
    container_name: cf_api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - postgres-main-network

  web:
    build:
      context: ./apps/web
      args:
        BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
        NEXT_PUBLIC_API_WS_URL: ${NEXT_PUBLIC_API_WS_URL:-ws://localhost:8000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://convoforge.app}
        NEXT_PUBLIC_UMAMI_SRC: ${NEXT_PUBLIC_UMAMI_SRC:-}
        NEXT_PUBLIC_UMAMI_ID: ${NEXT_PUBLIC_UMAMI_ID:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    container_name: cf_web
    restart: always
    env_file: .env
    ports:
      - "127.0.0.1:3015:3000"
    volumes:
      - ./apps/web/content/blog:/app/content/blog
      - ./apps/web/public/.well-known/security.txt:/app/public/.well-known/security.txt
    networks:
      - postgres-main-network

networks:
  postgres-main-network:
    external: true
